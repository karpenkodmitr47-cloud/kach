<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); padding: 20px; }
        .card { background: var(--tg-theme-secondary-bg-color, #f5f5f5); padding: 15px; border-radius: 12px; }
        input, select { width: 100%; margin: 8px 0; padding: 12px; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #31b545; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; font-size: 16px; cursor: pointer; }
        #result { display: none; margin-top: 20px; padding: 15px; background: #e8f5e9; border-radius: 10px; color: #2e7d32; text-align: center; }
    </style>
</head>
<body>
    <div class="card" id="main-form">
        <h2 style="text-align:center;">📊 Калькулятор КБЖУ</h2>
        <label>Ваш пол:</label>
        <select id="gender">
            <option value="male">Мужчина</option>
            <option value="female">Женщина</option>
        </select>
        <input type="number" id="weight" placeholder="Вес (кг)" inputmode="decimal">
        <input type="number" id="height" placeholder="Рост (см)" inputmode="decimal">
        <input type="number" id="age" placeholder="Возраст" inputmode="numeric">
        <button id="calc_btn">РАССЧИТАТЬ</button>
    </div>

    <div id="result"></div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Ждем полной загрузки DOM
        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('calc_btn');
            
            btn.onclick = function() {
                try {
                    const w = parseFloat(document.getElementById('weight').value);
                    const h = parseFloat(document.getElementById('height').value);
                    const a = parseInt(document.getElementById('age').value);
                    const g = document.getElementById('gender').value;

                    if (isNaN(w)  isNaN(h)  isNaN(a)) {
                        alert("Пожалуйста, введите корректные числа во все поля");
                        return;
                    }

                    // Формула Миффлина-Сан Жеора
                    let bmr = (g === 'male') 
                        ? (10 * w + 6.25 * h - 5 * a + 5) 
                        : (10 * w + 6.25 * h - 5 * a - 161);
                    
                    const calories = Math.round(bmr * 1.375);
                    const protein = Math.round(w * 2);
                    const fats = Math.round(w * 0.8);

                    // Скрываем форму и показываем результат
                    document.getElementById('main-form').style.display = 'none';
                    const resDiv = document.getElementById('result');
                    resDiv.style.display = 'block';
                    resDiv.innerHTML = `
                        <h3>Твоя норма: ${calories} ккал</h3>
                        <p>🥩 Белки: ${protein}г<br>🧀 Жиры: ${fats}г</p>
                        <button id="close_btn" style="background:#248bcf">ПОНЯТНО, В ЗАЛ!</button>
                    `;

                    document.getElementById('close_btn').onclick = () => tg.close();

                    // Попытка отправить данные боту (сработает только в ЛС)
                    tg.sendData(JSON.stringify({calories: calories, protein: protein}));
                    
                } catch (error) {
                    alert("Ошибка при расчете: " + error.message);
                }
            };
        });
    </script>
</body>
</html>
